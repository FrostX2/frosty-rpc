<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Discord RPC</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Custom Discord RPC</h1>

  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Disconnected</span>
  </div>

  <div class="form-group">
    <label for="clientId">Client ID</label>
    <input type="text" id="clientId" placeholder="Discord Application Client ID">
  </div>

  <div class="form-group">
    <label for="details">Details (first line)</label>
    <input type="text" id="details" placeholder="Playing a game">
  </div>

  <div class="form-group">
    <label for="state">State (second line)</label>
    <input type="text" id="state" placeholder="In menu">
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="largeImageKey">Large Image Key</label>
      <input type="text" id="largeImageKey" placeholder="logo">
    </div>
    <div class="form-group">
      <label for="largeImageText">Large Image Tooltip</label>
      <input type="text" id="largeImageText" placeholder="My App">
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="smallImageKey">Small Image Key</label>
      <input type="text" id="smallImageKey" placeholder="icon">
    </div>
    <div class="form-group">
      <label for="smallImageText">Small Image Tooltip</label>
      <input type="text" id="smallImageText" placeholder="v1.0">
    </div>
  </div>

  <div class="form-group">
    <label>
      <input type="checkbox" id="showTime" checked>
      Show elapsed time
    </label>
  </div>

  <fieldset>
    <legend>Buttons (max 2)</legend>
    <div id="buttonsContainer">
      <div class="button-row">
        <input type="text" class="btn-label" placeholder="Label">
        <input type="text" class="btn-url" placeholder="https://...">
      </div>
      <div class="button-row">
        <input type="text" class="btn-label" placeholder="Label">
        <input type="text" class="btn-url" placeholder="https://...">
      </div>
    </div>
  </fieldset>

  <div class="actions">
    <button id="connectBtn" class="btn primary">Connect</button>
    <button id="updateBtn" class="btn secondary" disabled>Update</button>
    <button id="disconnectBtn" class="btn danger" disabled>Disconnect</button>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
